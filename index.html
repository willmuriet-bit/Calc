<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Calculatrice · PWA</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: black;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .app-container {
      position: relative;
      width: 100%;
      max-width: 420px;
      height: 100%;
      max-height: 900px;
      margin: 0 auto;
    }
    .calculator {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: black;
      padding: 0;
      z-index: 10;
      transition: opacity 0.3s ease;
    }

    .calculator.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .fullscreen-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      background: black;
    }

    .fullscreen-image.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .fullscreen-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-text {
      position: absolute;
      color: #808080;
      font-size: 12px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);      z-index: 6;
      white-space: nowrap;
      pointer-events: none;
    }

    .display-container {
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 10px 5px 10px;
      min-height: 0;
      overflow: hidden;
    }
    
    .display {
      width: 100%;
      color: white;
      text-align: right;
      font-size: clamp(4rem, 18vw, 7rem);
      font-weight: 300;
      padding: 0.3rem 0.5rem 0.2rem 0.5rem;
      white-space: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      direction: ltr;
      line-height: 1.2;
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    
    .display::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.7rem;
      width: 100%;
      padding: 0.5rem 0.8rem 1.5rem 0.8rem;
      background: black;
      flex-shrink: 0;
    }
    button {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: none;
      border-radius: 50%;
      font-size: 2rem;
      font-weight: 400;
      cursor: pointer;
      transition: filter 0.1s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      color: white;
      padding: 0;
      box-shadow: none;
      outline: none;
      -webkit-appearance: none;
    }

    button span {
      display: block;
      line-height: 1;
      pointer-events: none;
    }

    .btn-zero {
      grid-column: span 2;
      aspect-ratio: auto;
      border-radius: 60px;
      justify-content: flex-start;
      padding-left: 1.8rem;
    }

    .light-gray {
      background: #a5a5a5;
      color: #000;
    }
    .dark-gray {
      background: #333333;
      color: white;
    }
    .orange {
      background: #ff9f0a;
      color: white;
    }

    button:active {
      filter: brightness(1.4);
    }
    @media (min-width: 460px) {
      .buttons {
        gap: 0.9rem;
        padding: 0.8rem 1rem 2rem 1rem;
      }
      button {
        font-size: 2.4rem;
      }
      .btn-zero {
        padding-left: 2.2rem;
      }
    }

    @media (max-width: 340px) {
      button {
        font-size: 1.6rem;
      }
      .display {
        font-size: clamp(3.2rem, 15vw, 5rem);
      }
    }

    .install-btn {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff9f0a;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 0.7rem 1.5rem;
      font-size: 1rem;
      font-weight: 500;
      z-index: 1000;
      box-shadow: 0 4px 10px rgba(255,159,10,0.4);
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    /* PAGE DE CONFIGURATION */
    .config-page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;      z-index: 20;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .config-page.visible {
      display: flex;
    }

    .config-page h2 {
      color: white;
      font-size: 1.8rem;
      margin-bottom: 2rem;
      text-align: center;
    }

    .config-buttons {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      width: 100%;
      max-width: 300px;
    }

    .config-btn {
      width: 100%;
      padding: 1.2rem 2rem;
      border-radius: 15px;
      border: none;
      font-size: 1.2rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.1s ease, filter 0.1s ease;
      aspect-ratio: auto;
      color: white;
    }

    .config-btn:active {
      transform: scale(0.98);
    }

    .config-btn.import {
      background: #ff9f0a;
    }

    .config-btn.modify {
      background: #333333;    }

    .config-btn.return {
      background: #a5a5a5;
      color: black;
      margin-top: 1rem;
    }

    /* PAGE D'ÉDITION TEXTE */
    .edit-page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 40;
      display: none;
      flex-direction: column;
    }

    .edit-page.visible {
      display: flex;
    }

    .edit-page .fullscreen-image {
      z-index: 1;
      pointer-events: none;
    }

    .edit-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 2;
      padding: 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      transition: opacity 0.2s ease;
    }

    .edit-panel.controls-hidden {
      opacity: 0;
      pointer-events: none;
    }
    .edit-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #333;
    }

    .edit-panel-header h3 {
      color: white;
      font-size: 1.5rem;
      font-weight: 600;
    }

    .toggle-visibility-btn {
      width: 50px;
      height: 30px;
      border: 2px solid #ff9f0a;
      border-radius: 15px;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      aspect-ratio: auto;
    }

    .toggle-visibility-btn.active {
      background: #ff9f0a;
    }

    .toggle-visibility-btn svg {
      width: 20px;
      height: 20px;
      fill: #ff9f0a;
      transition: fill 0.3s ease;
    }

    .toggle-visibility-btn.active svg {
      fill: black;
    }

    .edit-control-group {
      margin-bottom: 1.8rem;
      width: 100%;
      max-width: 400px;
      margin-left: auto;      margin-right: auto;
    }

    .edit-control-label {
      color: #a5a5a5;
      font-size: 1rem;
      margin-bottom: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .edit-control-value {
      background: transparent;
      border: 1px solid #ff9f0a;
      color: #ff9f0a;
      padding: 0.3rem 0.8rem;
      border-radius: 15px;
      font-size: 0.9rem;
      font-weight: 500;
      min-width: 60px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .edit-control-value:active {
      background: #ff9f0a;
      color: black;
    }

    .edit-slider-wrapper {
      position: relative;
      width: 100%;
      height: 30px;
      display: flex;
      align-items: center;
    }

    .edit-slider-track {
      position: absolute;
      width: 100%;
      height: 6px;
      background: #333;
      border-radius: 3px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 1;
    }
    .edit-slider {
      position: absolute;
      width: 100%;
      height: 30px;
      background: transparent;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
      z-index: 2;
      top: 0;
      left: 0;
      margin: 0;
      padding: 0;
    }

    .edit-slider::-webkit-slider-runnable-track {
      width: 100%;
      height: 30px;
      background: transparent;
      border-radius: 3px;
      cursor: pointer;
    }

    .edit-slider::-moz-range-track {
      width: 100%;
      height: 30px;
      background: transparent;
      border-radius: 3px;
      cursor: pointer;
    }

    .edit-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #ff9f0a;
      cursor: grab;
      border: 2px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      margin-top: 4px;
      position: relative;
      z-index: 3;
      pointer-events: auto;
    }

    .edit-slider::-webkit-slider-thumb:active {      cursor: grabbing;
    }

    .edit-slider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #ff9f0a;
      cursor: grab;
      border: 2px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      position: relative;
      z-index: 3;
      border: none;
      margin: 0;
      top: 4px;
      pointer-events: auto;
    }

    .edit-slider::-moz-range-thumb:active {
      cursor: grabbing;
    }

    .edit-color-wrapper {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }

    .edit-color-input {
      width: 100%;
      height: 60px;
      border-radius: 12px;
      border: 2px solid #333;
      background: white;
      cursor: pointer;
      outline: none;
      -webkit-appearance: none;
    }

    .edit-color-input::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    .edit-color-input::-webkit-color-swatch {
      border: none;
      border-radius: 10px;
    }

    .edit-buttons {      display: flex;
      gap: 1rem;
      margin-top: auto;
      padding-top: 2rem;
      width: 100%;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .edit-btn {
      flex: 1;
      padding: 1rem;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      aspect-ratio: auto;
    }

    .edit-btn.save {
      background: #ff9f0a;
      color: black;
    }

    .edit-btn.save:active {
      transform: scale(0.98);
      filter: brightness(0.9);
    }

    .edit-btn.cancel {
      background: #333;
      color: white;
    }

    .edit-btn.cancel:active {
      transform: scale(0.98);
      filter: brightness(0.8);
    }

    #imageInput {
      display: none;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- CALCULATRICE -->    <div class="calculator" id="calculator">
      <div class="display-container">
        <div id="display" class="display">0</div>
      </div>

      <div class="buttons">
        <button class="light-gray" id="acButton" onclick="handleACorC()"><span>AC</span></button>
        <button class="light-gray" id="toggleSignButton" onclick="handlePlusMinusClick()" onmousedown="startToggleSignLongPress()" onmouseup="cancelToggleSignLongPress()" onmouseleave="cancelToggleSignLongPress()" ontouchstart="startToggleSignLongPress()" ontouchend="cancelToggleSignLongPress()" ontouchcancel="cancelToggleSignLongPress()"><span>+/-</span></button>
        <button class="light-gray" id="percentButton" onclick="handlePercent()"><span>%</span></button>
        <button class="orange" onclick="setOperator('/')"><span>÷</span></button>

        <button class="dark-gray" onclick="appendNumber('7')"><span>7</span></button>
        <button class="dark-gray" onclick="appendNumber('8')"><span>8</span></button>
        <button class="dark-gray" onclick="appendNumber('9')"><span>9</span></button>
        <button class="orange" onclick="setOperator('*')"><span>×</span></button>

        <button class="dark-gray" onclick="appendNumber('4')"><span>4</span></button>
        <button class="dark-gray" onclick="appendNumber('5')"><span>5</span></button>
        <button class="dark-gray" onclick="appendNumber('6')"><span>6</span></button>
        <button class="orange" onclick="setOperator('-')"><span>−</span></button>

        <button class="dark-gray" onclick="appendNumber('1')"><span>1</span></button>
        <button class="dark-gray" onclick="appendNumber('2')"><span>2</span></button>
        <button class="dark-gray" onclick="appendNumber('3')"><span>3</span></button>
        <button class="orange" onclick="setOperator('+')"><span>+</span></button>

        <button class="dark-gray btn-zero" id="zeroButton" onclick="appendNumber('0')" onmousedown="startZeroLongPress()" onmouseup="cancelZeroLongPress()" onmouseleave="cancelZeroLongPress()" ontouchstart="startZeroLongPress()" ontouchend="cancelZeroLongPress()" ontouchcancel="cancelZeroLongPress()"><span>0</span></button>
        <button class="dark-gray" id="dotButton" onclick="handleDotClick()"><span>.</span></button>
        <button class="orange" onclick="calculate()"><span>=</span></button>
      </div>
    </div>

    <!-- IMAGE PLEIN ÉCRAN -->
    <div class="fullscreen-image" id="fullscreenImage" ondblclick="hideImage()">
      <img id="fullscreenImg" src="capture.jpg" alt="Capture">
      <div class="image-text" id="imageText">ligne/across/page - P</div>
    </div>

    <!-- PAGE CONFIGURATION -->
    <div class="config-page" id="configPage">
      <h2>Configuration</h2>
      <div class="config-buttons">
        <button class="config-btn import" onclick="triggerImageImport()">📷 Importer l'image</button>
        <button class="config-btn modify" onclick="openEditPage()">✏️ Modifier le texte</button>
        <button class="config-btn return" onclick="closeConfigPage()">← Retour</button>
      </div>
      <input type="file" id="imageInput" accept="image/*" onchange="handleImageImport(event)">
    </div>

    <!-- PAGE D'ÉDITION TEXTE -->    <div class="edit-page" id="editPage">
      <div class="fullscreen-image visible" id="editFullscreenImage">
        <img id="editFullscreenImg" src="capture.jpg" alt="Capture">
        <div class="image-text" id="editImageText">ligne/across/page - P</div>
      </div>

      <div class="edit-panel" id="editPanel">
        <div class="edit-panel-header">
          <h3>Modifier le texte</h3>
          <button class="toggle-visibility-btn active" id="editToggleBtn" onmousedown="startPanelHide()" onmouseup="endPanelHide()" onmouseleave="endPanelHide()" ontouchstart="startPanelHide()" ontouchend="endPanelHide()" ontouchcancel="endPanelHide()">
            <svg viewBox="0 0 24 24" id="editEyeIcon">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
          </button>
        </div>

        <div class="edit-control-group">
          <div class="edit-control-label">
            <span>Position X</span>
            <span class="edit-control-value" id="editPosXValue" onclick="resetSlider('posX')">50%</span>
          </div>
          <div class="edit-slider-wrapper">
            <div class="edit-slider-track"></div>
            <input type="range" min="0" max="100" value="50" class="edit-slider" id="editPosXSlider" oninput="updateSliderValue('posX', this.value)">
          </div>
        </div>

        <div class="edit-control-group">
          <div class="edit-control-label">
            <span>Position Y</span>
            <span class="edit-control-value" id="editPosYValue" onclick="resetSlider('posY')">50%</span>
          </div>
          <div class="edit-slider-wrapper">
            <div class="edit-slider-track"></div>
            <input type="range" min="0" max="100" value="50" class="edit-slider" id="editPosYSlider" oninput="updateSliderValue('posY', this.value)">
          </div>
        </div>

        <div class="edit-control-group">
          <div class="edit-control-label">
            <span>Taille</span>
            <span class="edit-control-value" id="editSizeValue" onclick="resetSlider('size')">12px</span>
          </div>
          <div class="edit-slider-wrapper">
            <div class="edit-slider-track"></div>
            <input type="range" min="8" max="48" value="12" class="edit-slider" id="editSizeSlider" oninput="updateSliderValue('size', this.value)">
          </div>
        </div>

        <div class="edit-control-group">          <div class="edit-control-label">
            <span>Couleur</span>
          </div>
          <div class="edit-color-wrapper">
            <input type="color" class="edit-color-input" id="editColorInput" value="#808080" onchange="updateColor(this.value)">
          </div>
        </div>

        <div class="edit-buttons">
          <button class="edit-btn cancel" onclick="closeEditPage()">Annuler</button>
          <button class="edit-btn save" onclick="saveTextSettings()">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>

<script>
  // ===== VARIABLES GLOBALES =====
  let display, acButton, toggleSignButton, percentButton, dotButton, zeroButton;
  let calculator, fullscreenImage, fullscreenImg, imageText;
  let configPage, editPage, editPanel, editFullscreenImage, editFullscreenImg, editImageText;
  let imageInput;
  let editPosXSlider, editPosYSlider, editSizeSlider, editColorInput;
  let editPosXValue, editPosYValue, editSizeValue;
  let editToggleBtn, editEyeIcon;

  const MAX_DIGITS = 8;
  const API_URL = 'https://pi-revelations-3a64f-default-rtdb.europe-west1.firebasedatabase.app/code/.json';
  const TOGGLE_SIGN_LONG_PRESS = 500;
  const ZERO_LONG_PRESS = 1000;
  const PLUS_MINUS_PERCENT_DELAY = 300;

  const DEFAULT_SETTINGS = {
    x: 50,
    y: 50,
    size: 12,
    color: '#808080',
    visible: true
  };

  let P = null;
  let apiData = null;
  let percentCycle = 0;
  let secretMode = true;
  let firstNumber = null;
  let operator = null;
  let waitingForSecondNumber = false;
  let equalPressCount = 0;
  let pStored = false;
  let toggleSignLongPressTimer = null;
  let zeroLongPressTimer = null;
  let dotClickCount = 0;
  let dotClickTimer = null;
  let plusMinusClicked = false;
  let plusMinusTimer = null;

  let textSettings = { ...DEFAULT_SETTINGS };
  let tempTextSettings = { ...DEFAULT_SETTINGS };

  let activeSlider = null;
  let isDragging = false;

  // ===== INITIALISATION =====
  document.addEventListener('DOMContentLoaded', function() {
    initElements();
    loadSavedSettings();
    updateACButton();
    setupSliderEventListeners();
    console.log('✅ Calculatrice initialisée');
  });

  function initElements() {
    display = document.getElementById('display');
    acButton = document.getElementById('acButton');
    toggleSignButton = document.getElementById('toggleSignButton');
    percentButton = document.getElementById('percentButton');
    dotButton = document.getElementById('dotButton');
    zeroButton = document.getElementById('zeroButton');
    calculator = document.getElementById('calculator');
    fullscreenImage = document.getElementById('fullscreenImage');
    fullscreenImg = document.getElementById('fullscreenImg');
    imageText = document.getElementById('imageText');
    configPage = document.getElementById('configPage');
    editPage = document.getElementById('editPage');
    editPanel = document.getElementById('editPanel');
    editFullscreenImage = document.getElementById('editFullscreenImage');
    editFullscreenImg = document.getElementById('editFullscreenImg');
    editImageText = document.getElementById('editImageText');
    imageInput = document.getElementById('imageInput');
    editPosXSlider = document.getElementById('editPosXSlider');
    editPosYSlider = document.getElementById('editPosYSlider');
    editSizeSlider = document.getElementById('editSizeSlider');
    editColorInput = document.getElementById('editColorInput');
    editPosXValue = document.getElementById('editPosXValue');
    editPosYValue = document.getElementById('editPosYValue');
    editSizeValue = document.getElementById('editSizeValue');
    editToggleBtn = document.getElementById('editToggleBtn');
    editEyeIcon = document.getElementById('editEyeIcon');
  }
  // ===== GESTIONNAIRES D'ÉVÉNEMENTS POUR LES SLIDERS =====
  function setupSliderEventListeners() {
    const sliders = [editPosXSlider, editPosYSlider, editSizeSlider];
    
    sliders.forEach(slider => {
      if (!slider) return;
      
      // Mousedown/Touchstart pour détecter le début du drag
      slider.addEventListener('mousedown', handleSliderStart);
      slider.addEventListener('touchstart', handleSliderStart, {passive: false});
      
      // Mouseup/Touchend pour la fin
      slider.addEventListener('mouseup', handleSliderEnd);
      slider.addEventListener('touchend', handleSliderEnd);
      slider.addEventListener('mouseleave', handleSliderEnd);
    });
  }

  function handleSliderStart(e) {
    if (!editPanel) return;
    
    const slider = e.target;
    const rect = slider.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clickX = clientX - rect.left;
    
    const thumbValue = parseFloat(slider.value);
    const thumbPercent = (thumbValue - parseFloat(slider.min)) / (parseFloat(slider.max) - parseFloat(slider.min));
    const thumbPosition = thumbPercent * rect.width + 11; // +11 pour le centre du thumb (22px/2)
    
    // Si on ne clique pas près du thumb (à +/- 15px), empêcher l'action
    if (Math.abs(clickX - thumbPosition) > 15) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
    
    activeSlider = slider.id;
    isDragging = true;
    editPanel.classList.add('controls-hidden');
  }

  function handleSliderEnd(e) {
    isDragging = false;
    activeSlider = null;
    if (!editPanel) return;
    editPanel.classList.remove('controls-hidden');
  }
  // ===== SAUVEGARDE / CHARGEMENT =====
  function loadSavedSettings() {
    try {
      const saved = localStorage.getItem('calcTextSettings');
      if (saved) {
        textSettings = JSON.parse(saved);
        applyTextSettings();
      }
      const savedImage = localStorage.getItem('calcCustomImage');
      if (savedImage) {
        if (fullscreenImg) fullscreenImg.src = savedImage;
        if (editFullscreenImg) editFullscreenImg.src = savedImage;
      }
    } catch (e) {
      console.warn('⚠️ localStorage non disponible:', e);
    }
  }

  function saveTextSettingsToStorage() {
    try {
      localStorage.setItem('calcTextSettings', JSON.stringify(textSettings));
    } catch (e) {
      console.warn('⚠️ Impossible de sauvegarder:', e);
    }
  }

  function saveImageToStorage(imageDataUrl) {
    try {
      localStorage.setItem('calcCustomImage', imageDataUrl);
      if (editFullscreenImg) editFullscreenImg.src = imageDataUrl;
    } catch (e) {
      console.warn('⚠️ Image trop grande:', e);
      alert('⚠️ Image trop grande pour sauvegarde permanente');
    }
  }

  function applyTextSettings() {
    if (imageText) {
      imageText.style.left = textSettings.x + '%';
      imageText.style.top = textSettings.y + '%';
      imageText.style.fontSize = textSettings.size + 'px';
      imageText.style.color = textSettings.color;
      imageText.style.display = textSettings.visible ? 'block' : 'none';
    }
    if (editImageText) {
      editImageText.style.left = textSettings.x + '%';
      editImageText.style.top = textSettings.y + '%';
      editImageText.style.fontSize = textSettings.size + 'px';
      editImageText.style.color = textSettings.color;
      editImageText.style.display = textSettings.visible ? 'block' : 'none';    }
  }

  // ===== CALCULATRICE =====
  function resetCalculator() {
    if (!display) return;
    display.innerText = '0';
    firstNumber = null;
    operator = null;
    waitingForSecondNumber = false;
    P = null;
    apiData = null;
    pStored = false;
    equalPressCount = 0;
    secretMode = true;
    percentCycle = 0;
    updateImageText();
    updateACButton();
    console.log('🔄 Réinitialisé');
  }

  function formatToFourDigits(num) {
    return num.toString().padStart(4, '0');
  }

  function isValidForP(str) {
    if (str.includes('.')) return false;
    const num = parseInt(str, 10);
    return !isNaN(num) && num >= 0 && num <= 9999;
  }

  function updateImageText() {
    if (!imageText) return;
    if (apiData && P) {
      imageText.textContent = apiData.line + '/' + apiData.across + '/' + apiData.page + ' - ' + P;
    } else if (apiData) {
      imageText.textContent = apiData.line + '/' + apiData.across + '/' + apiData.page + ' - ?';
    } else if (P) {
      imageText.textContent = '?/?/? - ' + P;
    } else {
      imageText.textContent = '?/?/? - ?';
    }
    if (editImageText) {
      if (apiData && P) {
        editImageText.textContent = apiData.line + '/' + apiData.across + '/' + apiData.page + ' - ' + P;
      } else if (apiData) {
        editImageText.textContent = apiData.line + '/' + apiData.across + '/' + apiData.page + ' - ?';
      } else if (P) {
        editImageText.textContent = '?/?/? - ' + P;
      } else {        editImageText.textContent = '?/?/? - ?';
      }
    }
  }

  function showImage() {
    updateImageText();
    if (calculator) calculator.classList.add('hidden');
    if (fullscreenImage) fullscreenImage.classList.add('visible');
  }

  window.hideImage = function() {
    if (calculator) calculator.classList.remove('hidden');
    if (fullscreenImage) fullscreenImage.classList.remove('visible');
  };

  // ===== CONFIGURATION =====
  window.openConfigPage = function() {
    if (calculator) calculator.classList.add('hidden');
    if (configPage) configPage.classList.add('visible');
    plusMinusClicked = false;
    if (plusMinusTimer) {
      clearTimeout(plusMinusTimer);
      plusMinusTimer = null;
    }
  };

  window.closeConfigPage = function() {
    if (configPage) configPage.classList.remove('visible');
    if (calculator) calculator.classList.remove('hidden');
  };

  window.triggerImageImport = function() {
    if (imageInput) imageInput.click();
  };

  window.handleImageImport = function(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
      const imageDataUrl = e.target.result;
      if (fullscreenImg) fullscreenImg.src = imageDataUrl;
      if (editFullscreenImg) editFullscreenImg.src = imageDataUrl;
      saveImageToStorage(imageDataUrl);
      alert('✅ Image importée !');
    };
    reader.onerror = function() {
      alert('❌ Erreur import image');    };
    reader.readAsDataURL(file);
    if (imageInput) imageInput.value = '';
  };

  // ===== PAGE D'ÉDITION TEXTE =====
  window.openEditPage = function() {
    tempTextSettings = { ...textSettings };
    
    if (editPosXSlider) {
      editPosXSlider.value = tempTextSettings.x;
      editPosXValue.textContent = tempTextSettings.x + '%';
    }
    if (editPosYSlider) {
      editPosYSlider.value = tempTextSettings.y;
      editPosYValue.textContent = tempTextSettings.y + '%';
    }
    if (editSizeSlider) {
      editSizeSlider.value = tempTextSettings.size;
      editSizeValue.textContent = tempTextSettings.size + 'px';
    }
    if (editColorInput) {
      editColorInput.value = tempTextSettings.color;
    }
    
    updateEditVisibilityButton();
    
    if (calculator) calculator.classList.add('hidden');
    if (configPage) configPage.classList.remove('visible');
    if (editPage) editPage.classList.add('visible');
    if (editFullscreenImage) editFullscreenImage.classList.add('visible');
    
    applyTempSettings();
  };

  window.closeEditPage = function() {
    if (editPage) {
      editPage.classList.remove('visible');
      editPanel.classList.remove('controls-hidden');
    }
    if (calculator) calculator.classList.remove('hidden');
    applyTextSettings();
  };

  window.startPanelHide = function() {
    if (!editPanel) return;
    editPanel.classList.add('controls-hidden');
  };

  window.endPanelHide = function() {    if (!editPanel) return;
    editPanel.classList.remove('controls-hidden');
  };

  window.startSliderDrag = function(sliderType) {
    activeSlider = sliderType;
    isDragging = true;
    if (!editPanel) return;
    editPanel.classList.add('controls-hidden');
  };

  window.endSliderDrag = function() {
    isDragging = false;
    activeSlider = null;
    if (!editPanel) return;
    editPanel.classList.remove('controls-hidden');
  };

  window.resetSlider = function(type) {
    let defaultValue;
    if (type === 'posX') {
      defaultValue = DEFAULT_SETTINGS.x;
      tempTextSettings.x = defaultValue;
      if (editPosXSlider) editPosXSlider.value = defaultValue;
      if (editPosXValue) editPosXValue.textContent = defaultValue + '%';
    } else if (type === 'posY') {
      defaultValue = DEFAULT_SETTINGS.y;
      tempTextSettings.y = defaultValue;
      if (editPosYSlider) editPosYSlider.value = defaultValue;
      if (editPosYValue) editPosYValue.textContent = defaultValue + '%';
    } else if (type === 'size') {
      defaultValue = DEFAULT_SETTINGS.size;
      tempTextSettings.size = defaultValue;
      if (editSizeSlider) editSizeSlider.value = defaultValue;
      if (editSizeValue) editSizeValue.textContent = defaultValue + 'px';
    }
    applyTempSettings();
  };

  window.updateSliderValue = function(type, value) {
    if (!isDragging) return;
    
    const numValue = parseInt(value, 10);
    
    if (type === 'posX') {
      tempTextSettings.x = numValue;
      if (editPosXValue) editPosXValue.textContent = numValue + '%';
    } else if (type === 'posY') {
      tempTextSettings.y = numValue;
      if (editPosYValue) editPosYValue.textContent = numValue + '%';    } else if (type === 'size') {
      tempTextSettings.size = numValue;
      if (editSizeValue) editSizeValue.textContent = numValue + 'px';
    }
    
    applyTempSettings();
  };

  window.updateColor = function(color) {
    tempTextSettings.color = color;
    applyTempSettings();
  };

  window.toggleTextVisibility = function() {
    tempTextSettings.visible = !tempTextSettings.visible;
    updateEditVisibilityButton();
    applyTempSettings();
  };

  function updateEditVisibilityButton() {
    if (!editToggleBtn) return;
    if (tempTextSettings.visible) {
      editToggleBtn.classList.add('active');
    } else {
      editToggleBtn.classList.remove('active');
    }
  }

  function applyTempSettings() {
    if (!editImageText) return;
    editImageText.style.left = tempTextSettings.x + '%';
    editImageText.style.top = tempTextSettings.y + '%';
    editImageText.style.fontSize = tempTextSettings.size + 'px';
    editImageText.style.color = tempTextSettings.color;
    editImageText.style.display = tempTextSettings.visible ? 'block' : 'none';
  }

  window.saveTextSettings = function() {
    textSettings = { ...tempTextSettings };
    applyTextSettings();
    saveTextSettingsToStorage();
    closeEditPage();
    alert('✅ Paramètres enregistrés !');
  };

  // ===== BOUTONS CALCULATRICE =====
  window.handleDotClick = function() {
    if (!secretMode) {
      performAppendDot();
      return;    }
    
    dotClickCount++;
    if (dotClickTimer) clearTimeout(dotClickTimer);
    
    dotClickTimer = setTimeout(function() {
      dotClickCount = 0;
      dotClickTimer = null;
    }, 300);
    
    if (dotClickCount === 2) {
      showImage();
      dotClickCount = 0;
      clearTimeout(dotClickTimer);
      dotClickTimer = null;
      return;
    }
    
    performAppendDot();
  };

  function performAppendDot() {
    if (!display) return;
    let currentText = display.innerText;
    
    if (currentText === 'Erreur' || currentText === 'Chargement...') {
      display.innerText = '0';
      currentText = '0';
      firstNumber = null;
      operator = null;
      waitingForSecondNumber = false;
    }

    if (waitingForSecondNumber) {
      display.innerText = '0.';
      waitingForSecondNumber = false;
      resetPercentCycle();
    } else {
      if (currentText.includes('.')) return;
      display.innerText = currentText + '.';
    }
    
    updateACButton();
  }

  window.handlePlusMinusClick = function() {
    if (!secretMode) {
      performToggleSign();
      return;
    }    
    plusMinusClicked = true;
    if (plusMinusTimer) clearTimeout(plusMinusTimer);
    
    plusMinusTimer = setTimeout(function() {
      plusMinusClicked = false;
      plusMinusTimer = null;
      performToggleSign();
    }, PLUS_MINUS_PERCENT_DELAY);
  };

  function performToggleSign() {
    if (!display) return;
    if (display.innerText === 'Erreur' || display.innerText === 'Chargement...') return;
    let val = parseFloat(display.innerText);
    if (isNaN(val)) return;
    val = val * -1;
    display.innerText = formatDisplay(val);
    resetPercentCycle();
    updateACButton();
  }

  window.startToggleSignLongPress = function() {
    if (toggleSignLongPressTimer) clearTimeout(toggleSignLongPressTimer);
    
    toggleSignLongPressTimer = setTimeout(function() {
      secretMode = !secretMode;
      percentCycle = 0;
      plusMinusClicked = false;
      if (plusMinusTimer) {
        clearTimeout(plusMinusTimer);
        plusMinusTimer = null;
      }
      
      console.log(secretMode ? '🔓 Mode secret ON' : '🔒 Mode secret OFF');
      
      if (percentButton) {
        percentButton.style.filter = 'brightness(1.5)';
        setTimeout(function() {
          percentButton.style.filter = '';
        }, 200);
      }
      
      toggleSignLongPressTimer = null;
    }, TOGGLE_SIGN_LONG_PRESS);
  };

  window.cancelToggleSignLongPress = function() {
    if (toggleSignLongPressTimer) {
      clearTimeout(toggleSignLongPressTimer);      toggleSignLongPressTimer = null;
    }
  };

  window.startZeroLongPress = function() {
    if (zeroLongPressTimer) clearTimeout(zeroLongPressTimer);
    
    zeroLongPressTimer = setTimeout(function() {
      resetCalculator();
      if (zeroButton) {
        zeroButton.style.filter = 'brightness(1.5)';
        setTimeout(function() {
          zeroButton.style.filter = '';
        }, 200);
      }
      zeroLongPressTimer = null;
    }, ZERO_LONG_PRESS);
  };

  window.cancelZeroLongPress = function() {
    if (zeroLongPressTimer) {
      clearTimeout(zeroLongPressTimer);
      zeroLongPressTimer = null;
    }
  };

  function hasFourOrMoreDigits(numberStr) {
    const digitsOnly = numberStr.replace('-', '').replace('.', '');
    return digitsOnly.length >= 4;
  }

  async function fetchApiData(code) {
    try {
      const response = await fetch(API_URL);
      const data = await response.json();
      if (data[code]) {
        apiData = data[code];
        console.log('📡 API:', apiData);
        updateImageText();
      } else {
        apiData = null;
      }
    } catch (error) {
      console.error('⚠️ Erreur API:', error);
      apiData = null;
    }
  }

  window.handlePercent = function() {
    if (secretMode && plusMinusClicked) {      if (plusMinusTimer) {
        clearTimeout(plusMinusTimer);
        plusMinusTimer = null;
      }
      plusMinusClicked = false;
      openConfigPage();
      return;
    }
    
    if (!secretMode) {
      performNormalPercentage();
      return;
    }
    performSecretPercent();
  };

  function performNormalPercentage() {
    if (!display) return;
    if (display.innerText === 'Erreur' || display.innerText === 'Chargement...') return;
    let val = parseFloat(display.innerText);
    if (isNaN(val)) return;
    val = val / 100;
    display.innerText = formatDisplay(val);
    updateACButton();
  }

  function performSecretPercent() {
    setTimeout(function() {
      if (acButton) acButton.innerHTML = '<span>AC</span>';
    }, 0);
    
    if (P === null) {
      if (display) display.innerText = '0';
      updateACButton();
      return;
    }
    
    if (apiData === null) {
      if (display) display.innerText = 'Chargement...';
      updateACButton();
      return;
    }
    
    if (!display) return;
    
    switch(percentCycle) {
      case 0:
        display.innerText = P;
        percentCycle = 1;
        break;      case 1:
        display.innerText = apiData.line + '.' + apiData.across + '.' + apiData.page;
        percentCycle = 2;
        break;
      case 2:
        display.innerText = '' + apiData.line + apiData.across + apiData.page;
        percentCycle = 0;
        break;
    }
    
    updateACButton();
  }

  function resetPercentCycle() {
    percentCycle = 0;
  }

  function updateACButton() {
    if (!acButton || !display) return;
    const currentText = display.innerText;
    
    if (currentText === '0' || currentText === 'Erreur' || currentText === 'Chargement...' ||
        (waitingForSecondNumber && currentText === '0')) {
      acButton.innerHTML = '<span>AC</span>';
    } else {
      acButton.innerHTML = '<span>C</span>';
    }
  }

  window.handleACorC = function() {
    if (!display || !acButton) return;
    const currentText = display.innerText;
    const buttonText = acButton.innerText;
    
    if (buttonText === 'AC') {
      display.innerText = '0';
      firstNumber = null;
      operator = null;
      waitingForSecondNumber = false;
      resetPercentCycle();
      hideImage();
    } else {
      if (currentText === 'Erreur' || currentText === 'Chargement...') {
        display.innerText = '0';
      } else if (currentText.length === 1) {
        display.innerText = '0';
      } else if (currentText.length === 2 && currentText.startsWith('-')) {
        display.innerText = '0';
      } else {
        display.innerText = currentText.slice(0, -1);      }
    }
    
    updateACButton();
  };

  window.appendNumber = function(number) {
    if (!display) return;
    let currentText = display.innerText;
    
    if (currentText === 'Erreur' || currentText === 'Chargement...') {
      display.innerText = '0';
      currentText = '0';
      firstNumber = null;
      operator = null;
      waitingForSecondNumber = false;
    }

    if (waitingForSecondNumber) {
      if (number === '.') {
        display.innerText = '0.';
      } else {
        display.innerText = number;
      }
      waitingForSecondNumber = false;
      resetPercentCycle();
    } else {
      let newText = currentText;
      
      if (number === '.') {
        if (currentText.includes('.')) return;
        newText = currentText + '.';
      } else {
        if (currentText === '0') {
          newText = number;
        } else {
          newText = currentText + number;
        }
      }
      
      if (countDigits(newText) <= MAX_DIGITS) {
        display.innerText = newText;
      }
    }
    
    updateACButton();
  };

  window.setOperator = function(op) {
    if (!display) return;    if (operator && waitingForSecondNumber) {
      operator = op;
      updateACButton();
      return;
    }

    if (firstNumber !== null && operator && !waitingForSecondNumber) {
      let secondNumber = parseFloat(display.innerText);
      let result = operate(operator, firstNumber, secondNumber);
      if (result === 'Erreur') {
        display.innerText = 'Erreur';
        firstNumber = null;
        operator = null;
        waitingForSecondNumber = false;
        updateACButton();
        return;
      } else {
        const formattedResult = formatDisplay(result);
        display.innerText = formattedResult;
        firstNumber = parseFloat(formattedResult);
      }
    } else {
      firstNumber = parseFloat(display.innerText);
    }

    operator = op;
    waitingForSecondNumber = true;
    display.innerText = '0';
    resetPercentCycle();
    updateACButton();
  };

  window.calculate = function() {
    if (!operator || waitingForSecondNumber || !display) return;

    equalPressCount++;
    const currentNumberStr = display.innerText;
    
    if (secretMode && operator === '/' && P !== null && apiData !== null) {
      if (hasFourOrMoreDigits(currentNumberStr)) {
        const acrossStr = apiData.across.toString().padStart(2, '0');
        const result = apiData.line + '.' + acrossStr + apiData.page;
        display.innerText = result;
        firstNumber = null;
        operator = null;
        waitingForSecondNumber = true;
        resetPercentCycle();
        setTimeout(function() {
          if (acButton) acButton.innerHTML = '<span>AC</span>';
        }, 0);        updateACButton();
        return;
      }
    }
    
    const secondNumber = parseFloat(currentNumberStr);
    const result = operate(operator, firstNumber, secondNumber);

    if (result === 'Erreur') {
      display.innerText = 'Erreur';
      firstNumber = null;
      operator = null;
      waitingForSecondNumber = false;
      updateACButton();
      return;
    }

    if (!pStored && equalPressCount >= 3) {
      if (isValidForP(currentNumberStr)) {
        const num = parseInt(currentNumberStr, 10);
        P = formatToFourDigits(num);
        pStored = true;
        console.log('✅ P stocké:', P);
        fetchApiData(P);
        updateImageText();
      }
    }

    display.innerText = formatDisplay(result);
    firstNumber = parseFloat(display.innerText);
    operator = null;
    waitingForSecondNumber = true;
    resetPercentCycle();
    setTimeout(function() {
      if (acButton) acButton.innerHTML = '<span>AC</span>';
    }, 0);
    updateACButton();
  };

  function operate(op, a, b) {
    switch(op) {
      case '+': return a + b;
      case '-': return a - b;
      case '*': return a * b;
      case '/': 
        if (b === 0) return 'Erreur';
        return a / b;
      default: return b;
    }
  }
  function countDigits(str) {
    const withoutSign = str.replace('-', '');
    const digitsOnly = withoutSign.replace('.', '');
    return digitsOnly.length;
  }

  function formatDisplay(value) {
    let str = String(value);
    if (str === 'Erreur') return 'Erreur';
    
    const digitCount = countDigits(str);
    if (digitCount <= MAX_DIGITS) return str;
    
    if (str.includes('.')) {
      const parts = str.split('.');
      const integerPart = parts[0].replace('-', '');
      const sign = str.startsWith('-') ? '-' : '';
      
      if (integerPart.length >= MAX_DIGITS) {
        return sign + integerPart.substring(0, MAX_DIGITS);
      } else {
        const maxDecimals = MAX_DIGITS - integerPart.length;
        const decimalPart = parts[1].substring(0, maxDecimals);
        return sign + integerPart + '.' + decimalPart;
      }
    } else {
      const sign = str.startsWith('-') ? '-' : '';
      const absStr = str.replace('-', '');
      return sign + absStr.substring(0, MAX_DIGITS);
    }
  }

  // ===== PWA =====
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    const installBtn = document.createElement('button');
    installBtn.innerText = '📲 Ajouter à l\'écran';
    installBtn.classList.add('install-btn');
    document.body.appendChild(installBtn);

    installBtn.addEventListener('click', function() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function() {
        deferredPrompt = null;
        installBtn.remove();
      });    });
  });

  window.addEventListener('appinstalled', function() {
    const btn = document.querySelector('.install-btn');
    if (btn) btn.remove();
  });
</script>
